name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd packages/core && pip install -e . && cd ../..
          cd apps/p1_diligence_analyst && pip install -e . && cd ../..
          grep -v "^\-e " apps/p1_diligence_analyst/requirements.txt > /tmp/requirements_filtered.txt
          pip install -r /tmp/requirements_filtered.txt

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Set App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'duediligence'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false",                              "slotSetting": false },
              { "name": "ENABLE_ORYX_BUILD",              "value": "false",                              "slotSetting": false },
              { "name": "DEBUG",               "value": "${{ secrets.DEBUG }}",               "slotSetting": false },
              { "name": "SUPABASE_URL",        "value": "${{ secrets.SUPABASE_URL }}",        "slotSetting": false },
              { "name": "SUPABASE_ANON_KEY",   "value": "${{ secrets.SUPABASE_ANON_KEY }}",   "slotSetting": false },
              { "name": "SUPABASE_ADMIN_KEY",  "value": "${{ secrets.SUPABASE_ADMIN_KEY }}",  "slotSetting": false },
              { "name": "QDRANT_API_KEY",      "value": "${{ secrets.QDRANT_API_KEY }}",      "slotSetting": false },
              { "name": "COLLECTION_NAME",     "value": "${{ secrets.COLLECTION_NAME }}",     "slotSetting": false },
              { "name": "GROQ_API_KEY",        "value": "${{ secrets.GROQ_API_KEY }}",        "slotSetting": false },
              { "name": "LANGFUSE_PUBLIC_KEY", "value": "${{ secrets.LANGFUSE_PUBLIC_KEY }}", "slotSetting": false },
              { "name": "LANGFUSE_SECRET_KEY", "value": "${{ secrets.LANGFUSE_SECRET_KEY }}", "slotSetting": false },
              { "name": "LANGFUSE_BASE_URL",   "value": "${{ secrets.LANGFUSE_BASE_URL }}",   "slotSetting": false },
              { "name": "SECRET_KEY",          "value": "${{ secrets.SECRET_KEY }}",          "slotSetting": false },
              { "name": "FRONTEND_URL",        "value": "${{ secrets.FRONTEND_URL }}",        "slotSetting": false },
              { "name": "PORT",                "value": "8000",                               "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'duediligence'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip