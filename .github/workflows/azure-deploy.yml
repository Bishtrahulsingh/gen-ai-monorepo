name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd packages/core && pip install -e . && cd ../..
          cd apps/p1_diligence_analyst && pip install -e . && cd ../..
          grep -v "^\-e " apps/p1_diligence_analyst/requirements.txt > /tmp/requirements_filtered.txt
          pip install -r /tmp/requirements_filtered.txt

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'duediligence'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
          app-settings: |
            SCM_DO_BUILD_DURING_DEPLOYMENT=false
            ENABLE_ORYX_BUILD=false
            DEBUG=${{ secrets.DEBUG }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_ADMIN_KEY=${{ secrets.SUPABASE_ADMIN_KEY }}
            QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}
            COLLECTION_NAME=${{ secrets.COLLECTION_NAME }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }}
            LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}
            LANGFUSE_BASE_URL=${{ secrets.LANGFUSE_BASE_URL }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            PORT=8000